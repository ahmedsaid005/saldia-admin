<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Espace Parent/Élève - Emploi du temps</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            min-height: 100vh;
            font-size: 14px;
            color: #1a1a2e;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0;
            position: relative;
        }

        /* ==================== HEADER ==================== */
        .custom-header {
            background: #1a4d3e;
            border-radius: 0 0 40px 40px;
            padding: 20px 20px 30px 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-wrapper {
            background: #4dc9a0;
            border-radius: 50%;
            padding: 3px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4dc9a0, #2a9d8f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-text h4 {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .header-text h1 {
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-top: 4px;
        }

        .header-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .header-icon {
            color: white;
            font-size: 22px;
            cursor: pointer;
            position: relative;
        }

        .notification-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #f4d03f;
            color: #1a4d3e;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 20px;
            min-width: 18px;
            text-align: center;
        }

        /* ==================== SELECTEUR DATE ==================== */
        .date-selector {
            padding: 0 20px;
            margin-bottom: 10px;
        }

        .date-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 12px 20px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e8ecef;
        }

        .date-arrow {
            background: none;
            border: none;
            font-size: 20px;
            color: #2c3e50;
            cursor: pointer;
            padding: 8px 12px;
            transition: all 0.2s;
            border-radius: 50%;
        }

        .date-arrow:hover {
            background: #f0f4f8;
        }

        .current-date {
            font-size: 18px;
            font-weight: 600;
            color: #1a3a3a;
        }

        .week-info {
            text-align: center;
            font-size: 12px;
            color: #8a9aa8;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        /* ==================== TIMELINE ==================== */
        .timeline {
            padding: 20px;
            max-height: calc(100vh - 280px);
            overflow-y: auto;
        }

        .course-item {
            display: flex;
            margin-bottom: 28px;
            position: relative;
        }

        .course-time {
            width: 70px;
            font-size: 13px;
            font-weight: 500;
            color: #6c7a89;
            padding-top: 0;
            flex-shrink: 0;
        }

        .course-indicator {
            width: 4px;
            border-radius: 4px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .course-content {
            flex: 1;
            padding-bottom: 8px;
        }

        .course-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .course-teacher {
            font-size: 13px;
            color: #4a5568;
            margin-bottom: 4px;
        }

        .course-room {
            font-size: 12px;
            color: #8a9aa8;
        }

        /* Pause déjeuner */
        .lunch-item {
            display: flex;
            margin-bottom: 28px;
        }

        .lunch-time {
            width: 70px;
            font-size: 13px;
            font-weight: 500;
            color: #6c7a89;
            flex-shrink: 0;
        }

        .lunch-indicator {
            width: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .lunch-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #8a9aa8;
        }

        .lunch-content i {
            font-size: 20px;
            color: #cbd5e1;
        }

        .lunch-content span {
            font-size: 14px;
            color: #94a3b8;
        }

        /* Couleurs des matières */
        .color-francais { background: #3b82f6; }
        .color-histoire { background: #06b6d4; }
        .color-maths { background: #f97316; }
        .color-svt { background: #1e293b; }
        .color-anglais { background: #eab308; }
        .color-physique { background: #8b5cf6; }
        .color-eps { background: #10b981; }
        .color-philo { background: #ec489a; }

        /* ==================== PAGINATION ==================== */
        .pagination {
            position: fixed;
            bottom: 80px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            background: transparent;
        }

        .page-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #cbd5e1;
            transition: all 0.2s;
        }

        .page-dot.active {
            width: 24px;
            border-radius: 4px;
            background: #1a4d3e;
        }

        /* ==================== BOTTOM NAV ==================== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 16px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            z-index: 1000;
            border-top: 1px solid #edf2f7;
        }

        .nav-btn {
            flex: 1;
            margin: 0 4px;
            padding: 10px 8px;
            background: transparent;
            color: #6c757d;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .nav-btn i {
            font-size: 20px;
        }

        .nav-btn.active {
            background: #f0f4f8;
            color: #1a4d3e;
        }

        /* Content Panels */
        .content-panel {
            display: none;
            animation: fadeIn 0.3s ease;
            padding-bottom: 80px;
        }

        .content-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .info-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin: 20px;
            border: 1px solid #edf2f7;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        /* Formulaire */
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 28px;
            margin: 20px;
            border: 1px solid #edf2f7;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #2c3e50;
            font-size: 13px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
        }

        button {
            background: #1a4d3e;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }

        .btn-danger {
            background: #dc2626;
        }

        .message-success {
            background: #f0fdf4;
            color: #10b981;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
        }

        @media (max-width: 768px) {
            .timeline {
                padding: 15px;
            }
            .course-time {
                width: 55px;
                font-size: 12px;
            }
            .course-title {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header dynamique (caché sur les autres pages) -->
        <div id="dynamicHeader" style="display: none;">
            <div class="custom-header">
                <div class="header-content">
                    <div class="header-left">
                        <div class="avatar-wrapper">
                            <div class="avatar" id="studentAvatar">
                                <i class="fas fa-user-graduate"></i>
                            </div>
                        </div>
                        <div class="header-text">
                            <h4 id="studentRole">PARENT Fanny</h4>
                            <h1 id="pageTitle">Emploi du temps</h1>
                        </div>
                    </div>
                    <div class="header-right">
                        <i class="fas fa-home header-icon" onclick="showPanel('accueil')"></i>
                        <div class="header-icon" style="position: relative;">
                            <i class="fas fa-bars"></i>
                            <span class="notification-badge">3</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-btn" onclick="showPanel('connexion')"><i class="fas fa-lock"></i><span>Connexion</span></button>
            <button class="nav-btn" onclick="showPanel('emploiDuTemps')"><i class="fas fa-calendar-week"></i><span>Emploi du temps</span></button>
            <button class="nav-btn" onclick="showPanel('presenceStats')"><i class="fas fa-chart-line"></i><span>Présences</span></button>
            <button class="nav-btn" onclick="showPanel('support')"><i class="fas fa-headset"></i><span>Support</span></button>
        </div>

        <!-- Panel Connexion -->
        <div id="connexion" class="content-panel active">
            <div class="login-card" id="loginFormParent">
                <h3><i class="fas fa-key"></i> Connexion élève/parent</h3>
                <div class="form-group">
                    <label>Matricule</label>
                    <input type="text" id="matriculeLogin" placeholder="Entrez votre matricule">
                </div>
                <div class="form-group">
                    <label>Date de naissance</label>
                    <input type="date" id="dateNaissanceLogin">
                </div>
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="nomLogin" placeholder="Nom et prénom">
                </div>
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="telephoneLogin" placeholder="Numéro de téléphone">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="emailLogin" placeholder="Email">
                </div>
                <button onclick="loginParent()">Se connecter</button>
            </div>
            <div id="eleveInfo" style="display:none;">
                <div class="info-card">
                    <h3><i class="fas fa-user-circle"></i> Informations personnelles</h3>
                    <div id="infoPersonnelles"></div>
                </div>
                <button class="btn-danger" onclick="logoutParent()">Se déconnecter</button>
            </div>
        </div>

        <!-- Panel Emploi du temps -->
        <div id="emploiDuTemps" class="content-panel">
            <div id="emploiDuTempsContent">
                <div class="date-selector">
                    <div class="date-nav">
                        <button class="date-arrow" onclick="changeWeek(-1)"><i class="fas fa-chevron-left"></i></button>
                        <span class="current-date" id="currentDateLabel">lun. 19 sept.</span>
                        <button class="date-arrow" onclick="changeWeek(1)"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="week-info" id="weekInfo">Semaine Q2</div>
                </div>
                <div class="timeline" id="timelineContainer">
                    <!-- Les cours seront chargés ici -->
                </div>
                <div class="pagination">
                    <div class="page-dot active"></div>
                    <div class="page-dot"></div>
                    <div class="page-dot"></div>
                </div>
            </div>
            <div id="noConnectionMessage" style="text-align: center; padding: 60px 20px; color: #8a9aa8; display: none;">
                <i class="fas fa-lock" style="font-size: 48px; margin-bottom: 16px;"></i>
                <p>Veuillez vous connecter pour voir votre emploi du temps</p>
            </div>
        </div>

        <!-- Panel Présences -->
        <div id="presenceStats" class="content-panel">
            <div class="info-card">
                <h3><i class="fas fa-chart-line"></i> Récapitulatif des présences</h3>
                <div id="presenceStatsContainer"></div>
            </div>
        </div>

        <!-- Panel Support -->
        <div id="support" class="content-panel">
            <div class="info-card">
                <h3><i class="fas fa-file-pdf"></i> Faire une demande de document</h3>
                <div class="form-group">
                    <label>Type de document</label>
                    <select id="typeDocument">
                        <option value="Certificat de scolarité">Certificat de scolarité</option>
                        <option value="Relevé de notes">Relevé de notes</option>
                        <option value="Attestation de réussite">Attestation de réussite</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Motif</label>
                    <textarea id="motifDemande" rows="4"></textarea>
                </div>
                <div id="demandeMessage"></div>
                <button onclick="soumettreDemande()">Soumettre</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC2AC5ZBXkHmtQhuksZnzt0B2sl-d8bvAg",
            authDomain: "teste-saldia.firebaseapp.com",
            projectId: "teste-saldia",
            storageBucket: "teste-saldia.firebasestorage.app",
            messagingSenderId: "620601259237",
            appId: "1:620601259237:web:57795c7a64082399d0d00c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentEleve = null;
        let currentWeekOffset = 0;
        let currentDate = new Date();

        // Données d'exemple pour l'emploi du temps
        const sampleTimetable = {
            '3A': {
                monday: [
                    { time: '8h00', subject: 'FRANÇAIS', teacher: 'Mme. Diallo', room: '105', color: 'color-francais' },
                    { time: '10h00', subject: 'HISTOIRE-GÉO', teacher: 'M. Kouadio', room: '203', color: 'color-histoire' },
                    { time: '12h00', isLunch: true },
                    { time: '13h30', subject: 'MATHÉMATIQUES', teacher: 'Mme. Bamba', room: '206', color: 'color-maths' },
                    { time: '15h30', subject: 'ANGLAIS', teacher: 'M. Smith', room: '101', color: 'color-anglais' }
                ],
                tuesday: [
                    { time: '8h00', subject: 'SVt', teacher: 'M. Koné', room: '304', color: 'color-svt' },
                    { time: '10h00', subject: 'MATHÉMATIQUES', teacher: 'Mme. Bamba', room: '206', color: 'color-maths' },
                    { time: '12h00', isLunch: true },
                    { time: '13h30', subject: 'PHYSIQUE-CHIMIE', teacher: 'M. Touré', room: 'Labo 1', color: 'color-physique' }
                ],
                wednesday: [
                    { time: '8h00', subject: 'ANGLAIS', teacher: 'M. Smith', room: '101', color: 'color-anglais' },
                    { time: '10h00', subject: 'FRANÇAIS', teacher: 'Mme. Diallo', room: '105', color: 'color-francais' },
                    { time: '12h00', isLunch: true },
                    { time: '13h30', subject: 'HISTOIRE-GÉO', teacher: 'M. Kouadio', room: '203', color: 'color-histoire' },
                    { time: '15h30', subject: 'EPS', teacher: 'M. Yao', room: 'Gymnase', color: 'color-eps' }
                ],
                thursday: [
                    { time: '8h00', subject: 'MATHÉMATIQUES', teacher: 'Mme. Bamba', room: '206', color: 'color-maths' },
                    { time: '10h00', subject: 'SVt', teacher: 'M. Koné', room: '304', color: 'color-svt' },
                    { time: '12h00', isLunch: true },
                    { time: '13h30', subject: 'PHILOSOPHIE', teacher: 'M. N\'Guessan', room: '102', color: 'color-philo' }
                ],
                friday: [
                    { time: '8h00', subject: 'FRANÇAIS', teacher: 'Mme. Diallo', room: '105', color: 'color-francais' },
                    { time: '10h00', subject: 'ANGLAIS', teacher: 'M. Smith', room: '101', color: 'color-anglais' },
                    { time: '12h00', isLunch: true },
                    { time: '13h30', subject: 'PHYSIQUE-CHIMIE', teacher: 'M. Touré', room: 'Labo 1', color: 'color-physique' }
                ]
            }
        };

        function showPanel(panelId) {
            document.querySelectorAll('.content-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            document.getElementById(panelId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.querySelector('span')?.innerText === (panelId === 'connexion' ? 'Connexion' : 
                    panelId === 'emploiDuTemps' ? 'Emploi du temps' :
                    panelId === 'presenceStats' ? 'Présences' : 'Support')) {
                    btn.classList.add('active');
                }
            });

            // Gérer l'affichage du header
            const header = document.getElementById('dynamicHeader');
            if (panelId === 'emploiDuTemps' || panelId === 'presenceStats' || panelId === 'support') {
                if (currentEleve) {
                    header.style.display = 'block';
                    document.getElementById('studentRole').innerHTML = `PARENT ${currentEleve.nom.split(' ')[0].toUpperCase()}`;
                    document.getElementById('pageTitle').innerHTML = panelId === 'emploiDuTemps' ? 'Emploi du temps' : 
                                                                    panelId === 'presenceStats' ? 'Présences' : 'Support';
                }
            } else {
                header.style.display = 'none';
            }

            if (panelId === 'emploiDuTemps') {
                if (currentEleve) {
                    document.getElementById('emploiDuTempsContent').style.display = 'block';
                    document.getElementById('noConnectionMessage').style.display = 'none';
                    loadTimetable();
                } else {
                    document.getElementById('emploiDuTempsContent').style.display = 'none';
                    document.getElementById('noConnectionMessage').style.display = 'block';
                }
            } else if (panelId === 'presenceStats' && currentEleve) {
                loadPresenceStats();
            }
        }

        function getWeekDates(offset) {
            const today = new Date();
            const currentDay = today.getDay();
            const monday = new Date(today);
            const diff = currentDay === 0 ? -6 : 1 - currentDay;
            monday.setDate(today.getDate() + diff + (offset * 7));
            
            const dates = [];
            for (let i = 0; i < 5; i++) {
                const date = new Date(monday);
                date.setDate(monday.getDate() + i);
                dates.push(date);
            }
            return dates;
        }

        function formatDateLabel(date) {
            const days = ['lun.', 'mar.', 'mer.', 'jeu.', 'ven.', 'sam.', 'dim.'];
            return `${days[date.getDay() === 0 ? 6 : date.getDay() - 1]} ${date.getDate()} ${getMonthName(date)}`;
        }

        function getMonthName(date) {
            const months = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'];
            return months[date.getMonth()];
        }

        function getWeekNumber(date) {
            const start = new Date(date.getFullYear(), 0, 1);
            const diff = Math.floor((date - start) / (24 * 60 * 60 * 1000));
            return Math.ceil((diff + start.getDay() + 1) / 7);
        }

        function changeWeek(delta) {
            currentWeekOffset += delta;
            updateDateDisplay();
            loadTimetable();
        }

        function updateDateDisplay() {
            const dates = getWeekDates(currentWeekOffset);
            if (dates.length > 0) {
                const firstDate = dates[0];
                const lastDate = dates[4];
                document.getElementById('currentDateLabel').innerHTML = `${formatDateLabel(firstDate)} - ${formatDateLabel(lastDate)}`;
                const weekNum = getWeekNumber(firstDate);
                document.getElementById('weekInfo').innerHTML = `Semaine Q${weekNum}`;
            }
        }

        function loadTimetable() {
            if (!currentEleve) return;
            
            const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday'];
            const dayNames = ['LUNDI', 'MARDI', 'MERCREDI', 'JEUDI', 'VENDREDI'];
            const dates = getWeekDates(currentWeekOffset);
            
            const timetable = sampleTimetable['3A'] || sampleTimetable['3A'];
            
            let html = '';
            
            for (let i = 0; i < days.length; i++) {
                const dayData = timetable[days[i]] || [];
                const dateStr = dates[i] ? `${formatDateLabel(dates[i])}` : '';
                
                html += `<div style="margin-bottom: 24px;">
                            <div style="display: flex; align-items: baseline; margin-bottom: 12px;">
                                <h3 style="font-size: 16px; font-weight: 700; color: #1a4d3e;">${dayNames[i]}</h3>
                                <span style="margin-left: 12px; font-size: 12px; color: #8a9aa8;">${dateStr}</span>
                            </div>`;
                
                for (const course of dayData) {
                    if (course.isLunch) {
                        html += `<div class="lunch-item">
                                    <div class="lunch-time">${course.time}</div>
                                    <div class="lunch-indicator"></div>
                                    <div class="lunch-content">
                                        <i class="fas fa-utensils"></i>
                                        <span>Pause déjeuner</span>
                                    </div>
                                </div>`;
                    } else {
                        html += `<div class="course-item">
                                    <div class="course-time">${course.time}</div>
                                    <div class="course-indicator ${course.color}"></div>
                                    <div class="course-content">
                                        <div class="course-title">${course.subject}</div>
                                        <div class="course-teacher"><i class="fas fa-chalkboard-user"></i> ${course.teacher}</div>
                                        <div class="course-room"><i class="fas fa-door-open"></i> Salle ${course.room}</div>
                                    </div>
                                </div>`;
                    }
                }
                html += `</div>`;
            }
            
            document.getElementById('timelineContainer').innerHTML = html || '<p style="text-align:center;padding:40px;">Aucun cours pour cette semaine</p>';
        }

        async function loginParent() {
            const matricule = document.getElementById('matriculeLogin').value;
            const dateNaissance = document.getElementById('dateNaissanceLogin').value;
            const nom = document.getElementById('nomLogin').value;
            const telephone = document.getElementById('telephoneLogin').value;
            const email = document.getElementById('emailLogin').value;
            
            const eleveDoc = await db.collection('eleves').doc(matricule).get();
            
            if (eleveDoc.exists) {
                const eleve = eleveDoc.data();
                if (eleve.dateNaissance === dateNaissance && 
                    eleve.nom.toLowerCase() === nom.toLowerCase() &&
                    eleve.telephone === telephone &&
                    eleve.email === email) {
                    
                    currentEleve = { matricule, ...eleve };
                    document.getElementById('loginFormParent').style.display = 'none';
                    document.getElementById('eleveInfo').style.display = 'block';
                    
                    loadEleveInfo();
                    showPanel('emploiDuTemps');
                } else {
                    alert('Informations incorrectes');
                }
            } else {
                alert('Matricule non trouvé');
            }
        }

        async function loadEleveInfo() {
            if (!currentEleve) return;
            
            const infoContainer = document.getElementById('infoPersonnelles');
            infoContainer.innerHTML = `
                <table style="width:100%">
                    <tr><td><strong>Nom complet</strong></td><td>${currentEleve.nom}</td></tr>
                    <tr><td><strong>Matricule</strong></td><td>${currentEleve.matricule}</td></tr>
                    <tr><td><strong>Classe</strong></td><td>${currentEleve.classe || '3A'}</td></tr>
                    <tr><td><strong>Téléphone</strong></td><td>${currentEleve.telephone}</td></tr>
                </table>
            `;
            updateDateDisplay();
        }

        async function loadPresenceStats() {
            if (!currentEleve) return;
            const container = document.getElementById('presenceStatsContainer');
            container.innerHTML = '<p style="text-align:center;padding:40px;">Chargement des statistiques...</p>';
            
            const snapshot = await db.collection('presences').where('matricule', '==', currentEleve.matricule).get();
            const presences = [];
            snapshot.forEach(doc => presences.push(doc.data()));
            
            if (presences.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:40px;">Aucune donnée de présence</p>';
                return;
            }
            
            const absences = presences.filter(p => p.statut === 'Absent').length;
            const retards = presences.filter(p => p.statut === 'Retard').length;
            
            container.innerHTML = `
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:center;">
                    <div style="padding:16px;background:#f0fdf4;border-radius:12px;">
                        <div style="font-size:28px;font-weight:700;color:#10b981;">${presences.length}</div>
                        <div style="font-size:12px;">Jours</div>
                    </div>
                    <div style="padding:16px;background:#fef2f2;border-radius:12px;">
                        <div style="font-size:28px;font-weight:700;color:#ef4444;">${absences}</div>
                        <div style="font-size:12px;">Absences</div>
                    </div>
                    <div style="padding:16px;background:#fff7ed;border-radius:12px;">
                        <div style="font-size:28px;font-weight:700;color:#f59e0b;">${retards}</div>
                        <div style="font-size:12px;">Retards</div>
                    </div>
                </div>
            `;
        }

        async function soumettreDemande() {
            const typeDocument = document.getElementById('typeDocument').value;
            const motif = document.getElementById('motifDemande').value;
            
            if (!motif) {
                document.getElementById('demandeMessage').innerHTML = '<div class="message-success" style="background:#fef2f2;color:#ef4444;">❌ Veuillez entrer un motif</div>';
                return;
            }
            
            await db.collection('demandes').add({
                typeDocument, motif,
                date: new Date().toISOString(),
                statut: 'En attente',
                nomComplet: currentEleve?.nom || 'Non connecté',
                matricule: currentEleve?.matricule || 'Non connecté'
            });
            
            document.getElementById('demandeMessage').innerHTML = '<div class="message-success">✅ Demande soumise!</div>';
            document.getElementById('motifDemande').value = '';
            setTimeout(() => document.getElementById('demandeMessage').innerHTML = '', 3000);
        }

        function logoutParent() {
            currentEleve = null;
            document.getElementById('loginFormParent').style.display = 'block';
            document.getElementById('eleveInfo').style.display = 'none';
            document.getElementById('matriculeLogin').value = '';
            document.getElementById('dateNaissanceLogin').value = '';
            document.getElementById('nomLogin').value = '';
            document.getElementById('telephoneLogin').value = '';
            document.getElementById('emailLogin').value = '';
            showPanel('connexion');
        }
    </script>
</body>
</html>
