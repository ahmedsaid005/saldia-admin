<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Saldia Admin | Gestion Examens & E.D.T</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-600: #4B5563;
            --gray-800: #1F2937;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F8FAFE 0%, #EEF2F9 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .admin-header {
            background: white;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area img {
            width: 45px;
            height: 45px;
            border-radius: 12px;
        }

        .logo-area h1 {
            font-size: 1.3rem;
            background: linear-gradient(135deg, var(--primary), #7C3AED);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Navigation Admin */
        .admin-nav {
            display: flex;
            gap: 1rem;
        }

        .nav-admin-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--gray-100);
            color: var(--gray-600);
        }

        .nav-admin-btn.active {
            background: var(--primary);
            color: white;
        }

        .nav-admin-btn:hover {
            transform: translateY(-2px);
        }

        /* Cartes */
        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray-800);
        }

        /* Formulaires */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--gray-600);
            margin-bottom: 0.3rem;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid var(--gray-200);
            border-radius: 1rem;
            font-size: 0.85rem;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-sm {
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
        }

        /* Grille */
        .row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .col {
            flex: 1;
            min-width: 200px;
        }

        /* Liste des classes à cocher */
        .classes-checkbox {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
            padding: 0.5rem;
            border: 1px solid var(--gray-200);
            border-radius: 1rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }

        /* Tableau EDT */
        .edt-table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }

        .edt-table th, .edt-table td {
            border: 1px solid var(--gray-200);
            padding: 0.8rem 0.5rem;
            text-align: center;
            font-size: 0.75rem;
            vertical-align: middle;
        }

        .edt-table th {
            background: var(--gray-100);
            font-weight: 700;
        }

        .time-cell {
            background: var(--gray-100);
            font-weight: 600;
            width: 90px;
        }

        .edt-select {
            width: 100%;
            padding: 0.3rem;
            border-radius: 0.5rem;
            border: 1px solid var(--gray-200);
            font-size: 0.7rem;
        }

        /* Liste des enregistrements */
        .saved-item {
            background: var(--gray-100);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .saved-item-info h4 {
            margin: 0;
            font-size: 1rem;
        }

        .saved-item-info p {
            margin: 0.3rem 0 0;
            font-size: 0.7rem;
            color: var(--gray-600);
        }

        .saved-item-badge {
            background: var(--primary);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.6rem;
            margin-left: 0.5rem;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            margin: 0 0.3rem;
        }

        /* Compte à rebours */
        .countdown-list {
            display: grid;
            gap: 1rem;
        }

        .countdown-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 1.2rem;
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .countdown-info h4 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }

        .countdown-timer {
            font-size: 1.5rem;
            font-weight: 800;
            font-family: monospace;
        }

        .countdown-classes {
            font-size: 0.65rem;
            opacity: 0.8;
            margin-top: 0.3rem;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-content {
            background: white;
            border-radius: 1.5rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 1rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 1rem;
        }

        .modal-footer {
            padding: 1rem;
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        /* Back button */
        .back-btn {
            background: var(--gray-100);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
        }

        .text-center {
            text-align: center;
        }

        @media (max-width: 768px) {
            .edt-table {
                font-size: 0.7rem;
            }
            .edt-table th, .edt-table td {
                padding: 0.4rem 0.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="admin-header">
        <div class="logo-area">
            <img src="https://groupescolairesaldia.com/wp-content/uploads/2022/06/logo.png" alt="Logo">
            <h1><i class="fas fa-crown"></i> Saldia Administration</h1>
        </div>
        <div class="admin-nav">
            <button class="nav-admin-btn active" data-tab="countdown">📅 Comptes à rebours</button>
            <button class="nav-admin-btn" data-tab="edt">📚 Emplois du temps spéciaux</button>
        </div>
    </div>

    <div id="mainContent"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC2AC5ZBXkHmtQhuksZnzt0B2sl-d8bvAg",
        authDomain: "teste-saldia.firebaseapp.com",
        projectId: "teste-saldia",
        storageBucket: "teste-saldia.firebasestorage.app",
        messagingSenderId: "620601259237",
        appId: "1:620601259237:web:57795c7a64082399d0d00c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentTab = "countdown";
    let allClasses = [];

    // Charger toutes les classes
    async function loadAllClasses() {
        const snapshot = await db.collection('classes').get();
        allClasses = [];
        snapshot.forEach(doc => {
            allClasses.push({ id: doc.id, name: doc.data().name || doc.id });
        });
        return allClasses;
    }

    // Afficher la page selon l'onglet
    async function renderCurrentTab() {
        if (currentTab === "countdown") {
            await renderCountdownTab();
        } else {
            await renderEdtTab();
        }
    }

    // ==================== COMPTES À REBOURS ====================
    async function renderCountdownTab() {
        await loadAllClasses();
        const countdowns = await db.collection('countdowns').orderBy('dateTime', 'asc').get();
        
        let html = `
            <div class="card">
                <h2><i class="fas fa-hourglass-half"></i> Nouveau compte à rebours</h2>
                <div class="row">
                    <div class="col">
                        <div class="form-group">
                            <label>Nom de l'examen</label>
                            <input type="text" id="examName" class="form-input" placeholder="Ex: BFEM 2026, BAC 2026...">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-group">
                            <label>Date et heure</label>
                            <input type="datetime-local" id="examDateTime" class="form-input">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Classes concernées (sélectionnez une ou plusieurs)</label>
                    <div class="classes-checkbox" id="classesCheckbox">
                        ${allClasses.map(c => `
                            <label class="checkbox-item">
                                <input type="checkbox" value="${c.id}" data-name="${c.name}">
                                <span>${c.name}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
                <button id="saveCountdownBtn" class="btn btn-primary"><i class="fas fa-save"></i> Enregistrer</button>
            </div>
            
            <div class="card">
                <h2><i class="fas fa-list"></i> Comptes à rebours actifs</h2>
                <div id="countdownList" class="countdown-list"></div>
            </div>
        `;
        
        document.getElementById('mainContent').innerHTML = html;
        
        // Afficher la liste des countdowns existants
        const countdownList = [];
        countdowns.forEach(doc => {
            countdownList.push({ id: doc.id, ...doc.data() });
        });
        renderCountdownList(countdownList);
        
        // Événement sauvegarde
        document.getElementById('saveCountdownBtn').addEventListener('click', async () => {
            const name = document.getElementById('examName').value.trim();
            const dateTime = document.getElementById('examDateTime').value;
            const selectedClasses = [];
            document.querySelectorAll('#classesCheckbox input:checked').forEach(cb => {
                selectedClasses.push({
                    id: cb.value,
                    name: cb.dataset.name
                });
            });
            
            if (!name || !dateTime) {
                alert("Veuillez remplir tous les champs");
                return;
            }
            
            if (selectedClasses.length === 0) {
                alert("Veuillez sélectionner au moins une classe");
                return;
            }
            
            await db.collection('countdowns').add({
                name: name,
                dateTime: new Date(dateTime).toISOString(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                classes: selectedClasses
            });
            
            alert("✅ Compte à rebours ajouté !");
            document.getElementById('examName').value = '';
            document.getElementById('examDateTime').value = '';
            document.querySelectorAll('#classesCheckbox input:checked').forEach(cb => cb.checked = false);
            await renderCountdownTab();
        });
    }
    
    function renderCountdownList(countdowns) {
        const container = document.getElementById('countdownList');
        if (!container) return;
        
        if (countdowns.length === 0) {
            container.innerHTML = '<p style="color: gray; text-align:center;">Aucun compte à rebours</p>';
            return;
        }
        
        let html = '';
        for (const cd of countdowns) {
            const targetDate = new Date(cd.dateTime);
            const now = new Date();
            const diff = targetDate - now;
            
            let timerText = '';
            if (diff <= 0) {
                timerText = '✅ TERMINÉ !';
            } else {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (86400000)) / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                timerText = `${days}j ${hours}h ${minutes}m ${seconds}s`;
            }
            
            const classesText = cd.classes.map(c => c.name).join(', ');
            const dateFormatted = new Date(cd.dateTime).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            
            html += `
                <div class="countdown-card" data-id="${cd.id}">
                    <div class="countdown-info">
                        <h4><i class="fas fa-graduation-cap"></i> ${cd.name}</h4>
                        <div class="countdown-classes">📅 ${dateFormatted} | 🏫 ${classesText}</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                        <div class="countdown-timer" id="timer-${cd.id}">${timerText}</div>
                        <div>
                            <button class="btn-icon edit-countdown" data-id="${cd.id}" style="color: #F59E0B;"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon delete-countdown" data-id="${cd.id}" style="color: #EF4444;"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        container.innerHTML = html;
        
        // Démarrer les timers
        for (const cd of countdowns) {
            startTimer(cd.id, cd.dateTime);
        }
        
        // Événements supprimer
        document.querySelectorAll('.delete-countdown').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.dataset.id;
                if (confirm("Supprimer ce compte à rebours ?")) {
                    await db.collection('countdowns').doc(id).delete();
                    await renderCountdownTab();
                }
            });
        });
        
        // Événements modifier
        document.querySelectorAll('.edit-countdown').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.dataset.id;
                const doc = await db.collection('countdowns').doc(id).get();
                const data = doc.data();
                showEditCountdownModal(id, data);
            });
        });
    }
    
    function startTimer(id, dateTimeStr) {
        const timerElement = document.getElementById(`timer-${id}`);
        if (!timerElement) return;
        
        const targetDate = new Date(dateTimeStr);
        
        const interval = setInterval(() => {
            const now = new Date();
            const diff = targetDate - now;
            
            if (diff <= 0) {
                timerElement.innerHTML = '✅ TERMINÉ !';
                clearInterval(interval);
            } else {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % 86400000) / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                timerElement.innerHTML = `${days}j ${hours}h ${minutes}m ${seconds}s`;
            }
        }, 1000);
    }
    
    async function showEditCountdownModal(id, data) {
        const modalHtml = `
            <div class="modal" id="editModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Modifier le compte à rebours</h3>
                        <button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label>Nom</label>
                            <input type="text" id="editName" class="form-input" value="${data.name}">
                        </div>
                        <div class="form-group">
                            <label>Date et heure</label>
                            <input type="datetime-local" id="editDateTime" class="form-input" value="${new Date(data.dateTime).toISOString().slice(0, 16)}">
                        </div>
                        <div class="form-group">
                            <label>Classes concernées</label>
                            <div class="classes-checkbox" id="editClassesCheckbox">
                                ${allClasses.map(c => `
                                    <label class="checkbox-item">
                                        <input type="checkbox" value="${c.id}" data-name="${c.name}" ${data.classes.some(cls => cls.id === c.id) ? 'checked' : ''}>
                                        <span>${c.name}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn" onclick="closeModal()">Annuler</button>
                        <button class="btn btn-primary" id="confirmEditBtn">Enregistrer</button>
                    </div>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        document.getElementById('confirmEditBtn').addEventListener('click', async () => {
            const newName = document.getElementById('editName').value.trim();
            const newDateTime = document.getElementById('editDateTime').value;
            const selectedClasses = [];
            document.querySelectorAll('#editClassesCheckbox input:checked').forEach(cb => {
                selectedClasses.push({
                    id: cb.value,
                    name: cb.dataset.name
                });
            });
            
            if (!newName || !newDateTime) {
                alert("Veuillez remplir tous les champs");
                return;
            }
            
            await db.collection('countdowns').doc(id).update({
                name: newName,
                dateTime: new Date(newDateTime).toISOString(),
                classes: selectedClasses
            });
            
            closeModal();
            await renderCountdownTab();
        });
    }
    
    // ==================== EMPLOIS DU TEMPS SPÉCIAUX ====================
    async function renderEdtTab() {
        await loadAllClasses();
        
        const specialEdts = await db.collection('special_timetables').orderBy('createdAt', 'desc').get();
        const edtList = [];
        specialEdts.forEach(doc => {
            edtList.push({ id: doc.id, ...doc.data() });
        });
        
        let html = `
            <div class="card">
                <h2><i class="fas fa-plus-circle"></i> Nouvel emploi du temps spécial</h2>
                <div class="row">
                    <div class="col">
                        <div class="form-group">
                            <label>Titre</label>
                            <input type="text" id="edtTitle" class="form-input" placeholder="Ex: CC1 du 1er Semestre, Composition...">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-group">
                            <label>Période (dates de la semaine)</label>
                            <input type="date" id="startDate" class="form-input">
                            <span> à </span>
                            <input type="date" id="endDate" class="form-input">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Classes concernées</label>
                    <div class="classes-checkbox" id="edtClassesCheckbox">
                        ${allClasses.map(c => `
                            <label class="checkbox-item">
                                <input type="checkbox" value="${c.id}" data-name="${c.name}">
                                <span>${c.name}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
                <button id="createEdtBtn" class="btn btn-primary"><i class="fas fa-table"></i> Créer l'emploi du temps</button>
            </div>
            
            <div class="card">
                <h2><i class="fas fa-archive"></i> Emplois du temps enregistrés</h2>
                <div id="savedEdtList">
                    ${edtList.map(edt => `
                        <div class="saved-item" data-id="${edt.id}">
                            <div class="saved-item-info">
                                <h4><i class="fas fa-calendar-alt"></i> ${edt.title}</h4>
                                <p>📅 ${new Date(edt.startDate).toLocaleDateString('fr-FR')} - ${new Date(edt.endDate).toLocaleDateString('fr-FR')} | 🏫 ${edt.classes.map(c => c.name).join(', ')}</p>
                            </div>
                            <div>
                                <button class="btn-icon view-edt" data-id="${edt.id}" style="color: #4F46E5;"><i class="fas fa-eye"></i></button>
                                <button class="btn-icon edit-edt" data-id="${edt.id}" style="color: #F59E0B;"><i class="fas fa-edit"></i></button>
                                <button class="btn-icon delete-edt" data-id="${edt.id}" style="color: #EF4444;"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        
        document.getElementById('mainContent').innerHTML = html;
        
        document.getElementById('createEdtBtn').addEventListener('click', () => {
            const title = document.getElementById('edtTitle').value.trim();
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const selectedClasses = [];
            document.querySelectorAll('#edtClassesCheckbox input:checked').forEach(cb => {
                selectedClasses.push({
                    id: cb.value,
                    name: cb.dataset.name
                });
            });
            
            if (!title || !startDate) {
                alert("Veuillez remplir le titre et la date de début");
                return;
            }
            
            if (selectedClasses.length === 0) {
                alert("Veuillez sélectionner au moins une classe");
                return;
            }
            
            // Ouvrir l'éditeur d'emploi du temps
            showEdtEditor(null, title, startDate, endDate, selectedClasses);
        });
        
        // Événements pour les enregistrements existants
        document.querySelectorAll('.view-edt').forEach(btn => {
            btn.addEventListener('click', () => viewEdt(btn.dataset.id));
        });
        
        document.querySelectorAll('.edit-edt').forEach(btn => {
            btn.addEventListener('click', () => editEdt(btn.dataset.id));
        });
        
        document.querySelectorAll('.delete-edt').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm("Supprimer cet emploi du temps ?")) {
                    await db.collection('special_timetables').doc(btn.dataset.id).delete();
                    await renderEdtTab();
                }
            });
        });
    }
    
    // Créneaux horaires
    const timeSlots = [
        "08h00-09h00", "09h00-10h00", "10h00-10h50", "11h05-12h05",
        "12h05-13h05", "13h35-14h35", "14h35-15h35", "15h35-16h35", "16h35-17h35"
    ];
    
    const jours = ["LUNDI", "MARDI", "MERCREDI", "JEUDI", "VENDREDI"];
    
    // Obtenir les dates des jours de la semaine
    function getWeekDates(startDateStr) {
        const start = new Date(startDateStr);
        const dayOfWeek = start.getDay(); // 0=dimanche, 1=lundi...
        const monday = new Date(start);
        const diff = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
        monday.setDate(start.getDate() + diff);
        
        const dates = {};
        const joursEn = ["monday", "tuesday", "wednesday", "thursday", "friday"];
        jours.forEach((jour, idx) => {
            const date = new Date(monday);
            date.setDate(monday.getDate() + idx);
            dates[joursEn[idx]] = date.toISOString().slice(0, 10);
        });
        return dates;
    }
    
    async function showEdtEditor(edtId, title, startDate, endDate, selectedClasses) {
        const weekDates = getWeekDates(startDate);
        
        let html = `
            <button class="back-btn" id="backToEdtList"><i class="fas fa-arrow-left"></i> Retour</button>
            <div class="card">
                <h2 class="text-center"><i class="fas fa-calendar-edit"></i> ${title}</h2>
                <p class="text-center" style="color: gray; margin-bottom: 1rem;">Du ${new Date(startDate).toLocaleDateString('fr-FR')} au ${endDate ? new Date(endDate).toLocaleDateString('fr-FR') : new Date(startDate).toLocaleDateString('fr-FR')}</p>
                
                <div style="overflow-x: auto;">
                    <table class="edt-table">
                        <thead>
                            <tr><th>Horaire</th>
                                ${jours.map((jour, idx) => {
                                    const dateKey = ["monday", "tuesday", "wednesday", "thursday", "friday"][idx];
                                    const dateStr = weekDates[dateKey];
                                    const dateFormatted = new Date(dateStr).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
                                    return `<th>${jour}<br><span style="font-size:0.6rem;">${dateFormatted}</span></th>`;
                                }).join('')}
                            </tr>
                        </thead>
                        <tbody>
                `;
        
        for (const slot of timeSlots) {
            html += `<tr><td class="time-cell">${slot}</td>`;
            for (let i = 0; i < 5; i++) {
                const dayKey = ["monday", "tuesday", "wednesday", "thursday", "friday"][i];
                const dateStr = weekDates[dayKey];
                const selectId = `slot_${dayKey}_${slot.replace(/[^0-9]/g, '_')}`;
                html += `
                    <td>
                        <select class="edt-select" id="${selectId}" data-day="${dayKey}" data-time="${slot}">
                            <option value="">-- Choisir une matière --</option>
                            <option value="Français">📖 Français</option>
                            <option value="Anglais">🇬🇧 Anglais</option>
                            <option value="Mathématiques">📐 Mathématiques</option>
                            <option value="Physique-Chimie">⚗️ Physique-Chimie</option>
                            <option value="Histoire-Géographie">🌍 Histoire-Géographie</option>
                            <option value="Philosophie">💭 Philosophie</option>
                            <option value="SVT">🔬 SVT</option>
                            <option value="Espagnol">🇪🇸 Espagnol</option>
                            <option value="Arabe">🕌 Arabe</option>
                            <option value="EPS">⚽ EPS</option>
                        </select>
                    </td>
                `;
            }
            html += `</tr>`;
        }
        
        html += `
                        </tbody>
                    </table>
                </div>
                
                <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem;">
                    <button id="saveEdtBtn" class="btn btn-primary"><i class="fas fa-save"></i> Enregistrer l'emploi du temps</button>
                </div>
            </div>
        `;
        
        document.getElementById('mainContent').innerHTML = html;
        
        // Si édition, charger les données existantes
        if (edtId) {
            const doc = await db.collection('special_timetables').doc(edtId).get();
            if (doc.exists) {
                const data = doc.data();
                if (data.schedule) {
                    for (const [key, value] of Object.entries(data.schedule)) {
                        const select = document.getElementById(key);
                        if (select && value) select.value = value;
                    }
                }
            }
        }
        
        document.getElementById('backToEdtList').addEventListener('click', () => renderEdtTab());
        
        document.getElementById('saveEdtBtn').addEventListener('click', async () => {
            const schedule = {};
            for (const slot of timeSlots) {
                for (const dayKey of ["monday", "tuesday", "wednesday", "thursday", "friday"]) {
                    const selectId = `slot_${dayKey}_${slot.replace(/[^0-9]/g, '_')}`;
                    const select = document.getElementById(selectId);
                    if (select && select.value) {
                        const key = `${dayKey}_${slot}`;
                        schedule[key] = select.value;
                    }
                }
            }
            
            const edtData = {
                title: title,
                startDate: startDate,
                endDate: endDate || startDate,
                classes: selectedClasses,
                schedule: schedule,
                weekDates: weekDates,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            if (edtId) {
                await db.collection('special_timetables').doc(edtId).update(edtData);
                alert("✅ Emploi du temps modifié !");
            } else {
                await db.collection('special_timetables').add(edtData);
                alert("✅ Emploi du temps enregistré !");
            }
            
            await renderEdtTab();
        });
    }
    
    async function viewEdt(edtId) {
        const doc = await db.collection('special_timetables').doc(edtId).get();
        const data = doc.data();
        if (!data) return;
        
        let html = `
            <button class="back-btn" id="backToEdtListView"><i class="fas fa-arrow-left"></i> Retour</button>
            <div class="card">
                <h2 class="text-center"><i class="fas fa-calendar-alt"></i> ${data.title}</h2>
                <p class="text-center" style="color: gray; margin-bottom: 1rem;">Du ${new Date(data.startDate).toLocaleDateString('fr-FR')} au ${new Date(data.endDate).toLocaleDateString('fr-FR')}</p>
                <p class="text-center" style="color: gray; margin-bottom: 1rem;">🏫 Classes: ${data.classes.map(c => c.name).join(', ')}</p>
                
                <div style="overflow-x: auto;">
                    <table class="edt-table">
                        <thead>
                            <tr><th>Horaire</th>
                                ${jours.map((jour, idx) => {
                                    const dateKey = ["monday", "tuesday", "wednesday", "thursday", "friday"][idx];
                                    const dateStr = data.weekDates ? data.weekDates[dateKey] : '';
                                    const dateFormatted = dateStr ? new Date(dateStr).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }) : '';
                                    return `<th>${jour}<br><span style="font-size:0.6rem;">${dateFormatted}</span></th>`;
                                }).join('')}
                            </tr>
                        </thead>
                        <tbody>
                `;
        
        for (const slot of timeSlots) {
            html += `<tr><td class="time-cell">${slot}</td>`;
            for (const dayKey of ["monday", "tuesday", "wednesday", "thursday", "friday"]) {
                const key = `${dayKey}_${slot}`;
                const value = data.schedule ? data.schedule[key] : '';
                html += `<td style="text-align:center;">${value ? `<strong>${value}</strong>` : '-'}</td>`;
            }
            html += `</tr>`;
        }
        
        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        
        document.getElementById('mainContent').innerHTML = html;
        document.getElementById('backToEdtListView').addEventListener('click', () => renderEdtTab());
    }
    
    async function editEdt(edtId) {
        const doc = await db.collection('special_timetables').doc(edtId).get();
        const data = doc.data();
        if (!data) return;
        
        await loadAllClasses();
        showEdtEditor(edtId, data.title, data.startDate, data.endDate, data.classes);
    }
    
    function closeModal() {
        const modal = document.getElementById('editModal');
        if (modal) modal.remove();
    }
    
  
  
    // Initialisation
    document.querySelectorAll('.nav-admin-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-admin-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            renderCurrentTab();
        });
    });
    
    renderCurrentTab();
  
  // ========== GESTION DES HORAIRES DYNAMIQUES ==========
async function saveTimeSlots() {
    const slots = [];
    for (let i = 0; i < 9; i++) {
        const start = document.getElementById(`slot_start_${i}`)?.value;
        const end = document.getElementById(`slot_end_${i}`)?.value;
        if (start && end) {
            slots.push({ start: start, end: end, display: `${start}-${end}` });
        }
    }
    
    await db.collection('settings').doc('timeSlots').set({
        slots: slots,
        updatedAt: new Date()
    });
    alert("✅ Horaires sauvegardés !");
}

async function loadTimeSlotsForAdmin() {
    const doc = await db.collection('settings').doc('timeSlots').get();
    if (doc.exists) {
        return doc.data().slots;
    }
    return [
        { start: "08h00", end: "09h00", display: "08h00-09h00" },
        { start: "09h00", end: "10h00", display: "09h00-10h00" },
        { start: "10h00", end: "10h50", display: "10h00-10h50" },
        { start: "11h05", end: "12h05", display: "11h05-12h05" },
        { start: "12h05", end: "13h05", display: "12h05-13h05" },
        { start: "13h35", end: "14h35", display: "13h35-14h35" },
        { start: "14h35", end: "15h35", display: "14h35-15h35" },
        { start: "15h35", end: "16h35", display: "15h35-16h35" },
        { start: "16h35", end: "17h35", display: "16h35-17h35" }
    ];
}

async function renderSettingsTab() {
    const slots = await loadTimeSlotsForAdmin();
    
    let html = `
        <div class="card">
            <h2><i class="fas fa-clock"></i> Configuration des horaires</h2>
            <p style="color: gray; margin-bottom: 1rem;">Modifiez les horaires des cours</p>
    `;
    
    for (let i = 0; i < slots.length; i++) {
        html += `
            <div style="display: flex; gap: 1rem; margin-bottom: 0.5rem; align-items: center;">
                <input type="text" id="slot_start_${i}" value="${slots[i].start}" style="flex:1; padding: 0.5rem; border-radius: 0.8rem; border: 1px solid #ccc;">
                <span>à</span>
                <input type="text" id="slot_end_${i}" value="${slots[i].end}" style="flex:1; padding: 0.5rem; border-radius: 0.8rem; border: 1px solid #ccc;">
            </div>
        `;
    }
    
    html += `
            <button id="saveTimeSlotsBtn" class="btn btn-primary" style="margin-top: 1rem;">💾 Enregistrer les horaires</button>
        </div>
    `;
    
    document.getElementById('mainContent').innerHTML = html;
    
    document.getElementById('saveTimeSlotsBtn').addEventListener('click', saveTimeSlots);
}
</script>
